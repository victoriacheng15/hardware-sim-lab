name: Go Lint & Test

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

env:
  go-version: '1.26'

jobs:
  fmt-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    needs: fmt-vet
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

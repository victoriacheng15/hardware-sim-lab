name: Build and Push Docker Images

on:
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'docker/**'
      - 'go.mod'
      - 'go.sum'
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'docker/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  detect-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      services: ${{ steps.services.outputs.services }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect changed service paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/') }}
        uses: dorny/paths-filter@v4
        with:
          filters: |
            sensor:
              - 'cmd/sensor/**'
              - 'internal/hardware-sim/**'
              - 'docker/sensor/**'
              - 'go.mod'
              - 'go.sum'
            chaos-controller:
              - 'cmd/chaos-controller/**'
              - 'internal/hardware-sim/**'
              - 'docker/chaos-controller/**'
              - 'go.mod'
              - 'go.sum'
            mqtt-ingestor:
              - 'cmd/mqtt-ingestor/**'
              - 'internal/mqttingestor/**'
              - 'internal/telemetry/**'
              - 'docker/mqtt-ingestor/**'
              - 'go.mod'
              - 'go.sum'

      - name: Select images to build
        id: services
        env:
          FULL_BUILD: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
          CHANGED_SERVICES: ${{ steps.filter.outputs.changes }}
        run: |
          if [ "$FULL_BUILD" = "true" ]; then
            echo 'services=["sensor","chaos-controller","mqtt-ingestor"]' >> "$GITHUB_OUTPUT"
          else
            echo "services=${CHANGED_SERVICES:-[]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: detect-services
    if: ${{ needs.detect-services.outputs.services != '[]' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-services.outputs.services) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,format=short
            type=raw,value=canary,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Log in to the Container registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

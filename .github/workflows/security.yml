name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'docker/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'docker/**'
      - 'go.mod'
      - 'go.sum'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  go-version: '1.26'

jobs:
  vuln-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: go.sum

      - name: Run vuln-scan
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.go-version }}
          go-package: ./...
          repo-checkout: false

  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table

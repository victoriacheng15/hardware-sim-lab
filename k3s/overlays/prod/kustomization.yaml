apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/hardware-sim
  - ../../base/rbac

images:
  - name: ghcr.io/victoriacheng15/hardware-sim-lab/chaos-controller
    newTag: canary
  - name: ghcr.io/victoriacheng15/hardware-sim-lab/mqtt-ingestor
    newTag: canary
  - name: ghcr.io/victoriacheng15/hardware-sim-lab/sensor
    newTag: canary

patches:
  - target:
      kind: Deployment
      name: chaos-controller
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: hardware-sim
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "hardware-sim"
  - target:
      kind: StatefulSet
      name: sensor-fleet
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: hardware-sim
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "hardware-sim"
  - target:
      kind: Service
      name: sensor-fleet
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: hardware-sim
  - target:
      name: hw-.*
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: hardware-sim
  - target:
      kind: RoleBinding
      name: hw-controller-binding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: hardware-sim
